<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>みんなのタイムライン</title>
  <style>
    :root { --accent:#1d9bf0; --bg:#fff; --fg:#0f1419; --muted:#536471; --line:#eff3f4; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,"Segoe UI",sans-serif; background:var(--bg); color:var(--fg); }
    .wrap { max-width:600px; margin:0 auto; border-left:1px solid var(--line); border-right:1px solid var(--line); min-height:100vh; }
    header { position:sticky; top:0; background:rgba(255,255,255,.85); backdrop-filter:blur(8px); padding:14px 16px; border-bottom:1px solid var(--line); font-weight:700; }
    .composer { display:flex; gap:10px; padding:14px 16px; border-bottom:8px solid var(--line); }
    .composer textarea { flex:1; border:none; resize:none; font:inherit; font-size:18px; outline:none; }
    .composer button { align-self:flex-end; background:var(--accent); color:#fff; border:none; border-radius:9999px; padding:8px 18px; font-weight:700; cursor:pointer; }
    .composer button:disabled { opacity:.5; cursor:default; }
    .post { display:flex; gap:10px; padding:12px 16px; border-bottom:1px solid var(--line); }
    .avatar { width:40px; height:40px; border-radius:9999px; background:var(--accent); color:#fff; display:grid; place-items:center; font-weight:700; flex:none; text-transform:uppercase; }
    .name { font-weight:700; } .body { white-space:pre-wrap; word-break:break-word; }
    .like { background:none; border:none; color:var(--muted); cursor:pointer; padding:6px 0 0; font:inherit; }
    .like.on { color:#f91880; }
    #status { padding:16px; color:var(--muted); text-align:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>みんなのタイムライン</header>
    <div class="composer">
      <textarea id="content" rows="2" maxlength="280" placeholder="いまどうしてる？"></textarea>
      <button id="postBtn" onclick="submitPost()">投稿</button>
    </div>
    <div id="timeline"></div>
    <div id="status">読み込み中…</div>
  </div>

  <script>
    function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function ago(ms){ const s=(Date.now()-ms)/1000; if(s<60)return Math.floor(s)+'s'; if(s<3600)return Math.floor(s/60)+'m'; if(s<86400)return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; }

    function render(posts){
      document.getElementById('status').style.display = posts.length ? 'none' : 'block';
      document.getElementById('timeline').innerHTML = posts.map(p => `
        <div class="post">
          <div class="avatar">${esc((p.name||'?')[0])}</div>
          <div>
            <div><span class="name">${esc(p.name)}</span> <span style="color:#536471">· ${ago(p.createdAt)}</span></div>
            <div class="body">${esc(p.content)}</div>
            <button class="like ${p.likedByMe?'on':''}" onclick="like('${p.id}')">♥ ${p.likeCount||0}</button>
          </div>
        </div>`).join('');
    }

    function fail(err){ document.getElementById('status').textContent = 'エラー: ' + err.message; }

    function load(){ google.script.run.withSuccessHandler(render).withFailureHandler(fail).getTimeline(); }

    function submitPost(){
      const el = document.getElementById('content');
      const text = el.value.trim();
      if(!text) return;
      document.getElementById('postBtn').disabled = true;
      google.script.run.withSuccessHandler(p => { el.value=''; document.getElementById('postBtn').disabled=false; render(p); })
        .withFailureHandler(e => { document.getElementById('postBtn').disabled=false; fail(e); }).addPost(text);
    }

    function like(id){ google.script.run.withSuccessHandler(render).withFailureHandler(fail).toggleLike(id); }

    load();
  </script>
</body>
</html>
