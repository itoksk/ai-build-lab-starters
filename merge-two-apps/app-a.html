<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App A — Design-rich</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"Helvetica Neue",sans-serif; min-height:100vh; color:#fff;
      background:linear-gradient(135deg,#1a0033,#3d0066 50%,#00334d);
      display:grid; place-content:center; text-align:center; padding:24px; overflow:hidden; }
    .ring { position:fixed; border-radius:50%; border:1px solid rgba(255,255,255,.12); animation:spin 30s linear infinite; }
    .r1 { width:120vmax; height:120vmax; } .r2 { width:80vmax; height:80vmax; animation-duration:22s; } .r3 { width:46vmax; height:46vmax; animation-duration:16s; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .content { position:relative; }
    h1 { font-size:clamp(2.6rem,10vw,6rem); font-weight:200; letter-spacing:.04em;
      background:linear-gradient(90deg,#fff,#b18cff,#5ce1e6); -webkit-background-clip:text; background-clip:text; color:transparent;
      animation:rise 1s cubic-bezier(.16,1,.3,1) both; }
    p { margin-top:18px; font-weight:300; letter-spacing:.2em; text-transform:uppercase; opacity:.8; animation:rise 1s .2s both; }
    @keyframes rise { from { opacity:0; transform:translateY(30px); } }
  </style>
</head>
<body>
  <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
  <div class="content">
    <h1>Aurora</h1>
    <p>A beautiful place to begin</p>
  </div>
</body>
</html>
