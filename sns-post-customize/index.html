<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SNS Post Template</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:system-ui,sans-serif; background:#e9ecf1; min-height:100vh; display:grid; place-content:center; padding:24px; }
    /* one-screen square post — screenshot this to share */
    .post { width:min(420px,92vw); aspect-ratio:1/1; border-radius:24px; padding:36px;
      background:linear-gradient(150deg,#ff8a3d,#ff5d73 60%,#a23bd8);
      color:#fff; display:flex; flex-direction:column; justify-content:space-between;
      box-shadow:0 24px 60px rgba(0,0,0,.18); }
    .title { font-size:clamp(2rem,8vw,3rem); font-weight:900; line-height:1.05; letter-spacing:-.02em; }
    .caption { font-size:1.05rem; opacity:.92; max-width:24ch; }   /* keep caption under 60 chars */
    .accent { font-size:2.4rem; align-self:flex-end; }            /* one accent emoji slot */
  </style>
</head>
<body>
  <div class="post">
    <div class="title">Brass Band<br>Concert</div>
    <div class="caption">Sat 7pm, the gym. Doors open 6:30 — come loud.</div>
    <div class="accent">🎺</div>
  </div>
</body>
</html>
